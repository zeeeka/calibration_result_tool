<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Parser Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pass { color: #16a34a; font-weight: bold; } /* Green */
        .fail { color: #dc2626; font-weight: bold; } /* Red */
        .n\/a { color: #9ca3af; } /* Gray */
    </style>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold mb-4 text-blue-800">Quality Audit Parser</h1>
        
        <textarea id="inputData" class="w-full h-48 p-4 border rounded-lg mb-4" placeholder="Paste the BMS text here..."></textarea>
        
        <div class="flex gap-4 mb-6">
            <button onclick="processData()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">Extract Statuses</button>
            <button id="shareBtn" class="hidden bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700">Generate Share Link</button>
        </div>

        <div id="results" class="space-y-2 border-t pt-4"></div>
    </div>

<script>
    function processData() {
        const rawText = document.getElementById('inputData').value;
        const parsedData = parseCalibration(rawText); 
        displayResults(parsedData);
    }

    function parseCalibration(text) {
        const lines = text.split('\n').map(l => l.trim()).filter(l => l !== "");
        const results = [];
        const statusPattern = /^(Pass|Fail|N\/A)$/i;

        lines.forEach((line, index) => {
            if (statusPattern.test(line)) {
                let attribute = "Unknown Attribute";
                
                // Look backwards from the "Pass/Fail" line to find the attribute name
                for (let i = index - 1; i >= 0; i--) {
                    const prevLine = lines[i];
                    
                    // Skip lines that are just "Failure Reason", "Weighted Average", or numbers
                    if (
                        !prevLine.toLowerCase().includes("failure reason") &&
                        !prevLine.toLowerCase().includes("weighted average") &&
                        !prevLine.toLowerCase().includes("qa comment") &&
                        !/^\d+(\.\d+)?$/.test(prevLine) // Ignores standalone numbers/scores
                    ) {
                        attribute = prevLine;
                        break; 
                    }
                }

                results.push({
                    attribute: attribute,
                    status: line
                });
            }
        });
        return results;
    }

    function displayResults(data) {
        const output = document.getElementById('results');
        if (data.length === 0) {
            output.innerHTML = '<p class="text-gray-500 italic">No data found. Try pasting the full report.</p>';
            return;
        }

        output.innerHTML = data.map(item => `
            <div class="flex justify-between items-center border-b py-3 hover:bg-gray-50 px-2 transition">
                <span class="text-sm text-gray-800 font-medium pr-4">${item.attribute}</span>
                <span class="text-xs px-2 py-1 rounded-full uppercase font-bold ${getStatusClass(item.status)}">
                    ${item.status}
                </span>
            </div>
        `).join('');

        document.getElementById('shareBtn').classList.remove('hidden');
    }

    function getStatusClass(status) {
        if (status.toLowerCase() === 'pass') return 'bg-green-100 text-green-700';
        if (status.toLowerCase() === 'fail') return 'bg-red-100 text-red-700';
        return 'bg-gray-100 text-gray-500';
    }
</script>
</body>
</html>
